spring.application.name=orchestrator-service
spring.application.name=orchestrator-service
server.port=8080

# Use the keys defined in your .env file
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.jwt.secret=${GOOGLE_JWT_SECRET}

#Datasource properties
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
# spring.datasource.driver-class-name=org.postgresql.Driver
#commented out because spring boot can auto detect the driver based on the url and the dependency in the pom.xml

# JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect